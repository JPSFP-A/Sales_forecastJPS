<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPS Sales Analytics & Forecasting Model</title>

    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://unpkg.com">

    <!-- Tailwind — must be sync (it processes DOM classes) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; }
        #loading-splash {
            position: fixed; inset: 0; background: #0f172a;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s;
        }
        #loading-splash.hidden { opacity: 0; pointer-events: none; }
        .splash-logo { color: #38bdf8; font-size: 2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; }
        .splash-sub { color: #64748b; font-size: 0.8rem; margin-bottom: 32px; }
        .splash-bar { width: 220px; height: 3px; background: #1e293b; border-radius: 2px; overflow: hidden; }
        .splash-fill { height: 100%; background: linear-gradient(90deg, #38bdf8, #818cf8); border-radius: 2px; animation: fill 2s ease-in-out infinite; }
        @keyframes fill { 0%{width:5%} 70%{width:85%} 100%{width:100%} }
        .splash-step { color: #475569; font-size: 0.7rem; margin-top: 12px; }
        .custom-scroll::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .table-pin-col { position: sticky; left: 0; background: white; z-index: 10; border-right: 2px solid #e2e8f0; }
        .table-pin-header { position: sticky; top: 0; background: #f8fafc; z-index: 20; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .dashboard-tab { padding: 10px 16px; font-size: 13px; cursor: pointer; border: none; background: transparent; color: #64748b; border-radius: 8px; transition: all 0.2s; display: flex; align-items: center; gap: 12px; text-align: left; width: 100%; font-weight: 500; }
        .dashboard-tab:hover { background: #f1f5f9; color: #0f172a; }
        .dashboard-tab.active { background: #e0f2fe; color: #0ea5e9; font-weight: 700; }
        th.sortable:hover { background-color: #e2e8f0; cursor: pointer; transition: background-color 0.2s; }
    </style>

    <!-- Credentials available immediately -->
    <script>
        window.EMBEDDED_SUPABASE_URL = 'https://rvtaryvxiryfmurudjcx.supabase.co';
        window.EMBEDDED_SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2dGFyeXZ4aXJ5Zm11cnVkamN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODI4MjMsImV4cCI6MjA5MTI1ODgyM30.qnieHBDcLHeoRKelnO3gUMK4qKR8tlBjkWgOopJrCmM';
        window.__hideSplash = function() {
            var s = document.getElementById('loading-splash');
            if (s) { s.classList.add('hidden'); setTimeout(function(){ if(s.parentNode) s.parentNode.removeChild(s); }, 600); }
        };
        setTimeout(window.__hideSplash, 12000); // hard fallback
    </script>

    <!--
        LOAD ORDER: defer guarantees scripts execute in declared order
        after HTML is parsed, but download in parallel.
        app.js is last — React/ReactDOM/Recharts all defined before it runs.
    -->
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script defer src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script defer src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script defer src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
    <script defer src="app.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans h-screen overflow-hidden flex flex-col">

</body>
