<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>

        .dashboard-tab:hover { background: #f1f5f9; color: #0f172a; }
        .dashboard-tab.active { background: #e0f2fe; color: #0ea5e9; font-weight: 700; }

</head>
<body class="bg-slate-100 text-slate-800 font-sans h-screen overflow-hidden flex flex-col">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useMemo, useEffect, useCallback, Component } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts;

        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex h-full w-full items-center justify-center p-6 bg-slate-100">
                            <div className="bg-red-50 border border-red-200 p-8 rounded-xl max-w-2xl w-full shadow-lg">
                                <h1 className="text-2xl font-black text-red-700 mb-4">Oops! The App Crashed</h1>
                                <p className="text-sm text-red-600 mb-4">Something went wrong during execution. Check the error details below:</p>
                                <pre className="bg-white p-4 rounded text-xs text-slate-800 overflow-auto shadow-inner">{this.state.error && this.state.error.toString()}</pre>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const Icons = {
            PieChart: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>,
            Database: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
            Activity: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
            TrendingUp: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
            Calculator: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/><path d="M8 18h.01"/><path d="M12 14h.01"/><path d="M12 18h.01"/></svg>,
            Wind: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9.59 4.59A2 2 0 1 1 11 8H2"/><path d="M12.59 19.41A2 2 0 1 0 14 16H2"/><path d="M15.83 7.17a2 2 0 1 0-1.41 3.42H20"/></svg>,
            Filter: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
            BookOpen: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Users: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            Zap: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            Calendar: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            CheckCircle: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            Download: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Briefcase: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
            Save: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
            History: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            X: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Eye: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
            Link: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>,
            Sliders: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>,
            RefreshCw: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>,
            CloudUp: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line></svg>,
            CloudDown: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path><polyline points="8 16 12 20 16 16"></polyline><line x1="12" y1="12" x2="12" y2="20"></line></svg>,
            Star: ({ filled }) => <svg width="16" height="16" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
        };

        const exportCSV = (data, filename) => {
            if (!data || !data.length) return;
            const headers = Object.keys(data[0]).filter(k => typeof data[0][k] !== 'object');
            const csvRows = [
                headers.join(','),
                ...data.map(row => headers.map(h => `"${(row[h] !== undefined && row[h] !== null) ? row[h].toString().replace(/"/g, '""') : ''}"`).join(','))
            ];
            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        };

        const monthMap = {"January":1,"February":2,"March":3,"April":4,"May":5,"June":6,"July":7,"August":8,"September":9,"October":10,"November":11,"December":12};
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const rcOrder = ['RT10', 'RT20', 'EV', 'RT40', 'RT50', 'RT60', 'RT70'];
        const getRcWeight = (rc) => { const index = rcOrder.findIndex(r => r.toLowerCase() === (rc || '').toLowerCase()); return index === -1 ? 999 : index; };
        
        const parseTimeStr = (str) => {
            if (!str) return { year: 0, month: 0, qtr: 0, sortKey: 0, text: 'Unassigned' };
            const parts = str.split(' ');
            if (parts.length !== 2) return { year: 0, month: 0, qtr: 0, sortKey: 0, text: str };
            const m = monthMap[parts[0]] || 0;
            const y = parseInt(parts[1]) || 0;
            const q = Math.ceil(m / 3);
            return { year: y, month: m, qtr: q, text: str, sortKey: (y * 100) + m, qtrText: `Q${q} ${y}` };
        };

        const formatNum = (num, decimals=0) => Number(num||0).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        const formatPct = (num) => (Number(num||0) * 100).toFixed(1) + '%';
        const cleanVal = (val) => parseFloat((val || '0').toString().replace(/,/g, ''));

        const parseCSV = (text) => {
            const rows = []; let currentRow = []; let currentCell = ''; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (inQuotes) {
                    if (char === '"' && text[i + 1] === '"') { currentCell += '"'; i++; }
                    else if (char === '"') { inQuotes = false; }
                    else { currentCell += char; }
                } else {
                    if (char === '"') { inQuotes = true; }
                    else if (char === ',') { currentRow.push(currentCell); currentCell = ''; }
                    else if (char === '\n' || char === '\r') {
                        currentRow.push(currentCell); rows.push(currentRow); currentRow = []; currentCell = '';
                        if (char === '\r' && text[i + 1] === '\n') i++;
                    } else { currentCell += char; }
                }
            }
            if (currentCell || currentRow.length > 0) { currentRow.push(currentCell); rows.push(currentRow); }
            const headers = rows[0]?.map(h => h.trim()) || [];
            const data = [];
            for (let i = 1; i < rows.length; i++) {
                if (rows[i].length < 2) continue;
                const obj = {};
                headers.forEach((h, j) => { obj[h] = rows[i][j] ? rows[i][j].trim() : ''; });
                data.push(obj);
            }
            return data;
        };

        function App() {
            // SET OVERVIEW AS THE DEFAULT TAB
            const [activeTab, setActiveTab] = useState('overview');

            // --- GITHUB CONFIGURATION ---
            // Uses localStorage so you don't have to hardcode credentials in the file.
            const [githubConfig, setGithubConfig] = useState(() => {
                const saved = localStorage.getItem('jps_github_config');
                return saved ? JSON.parse(saved) : { token: '', owner: '', repo: '' };
            });

            const updateGithubConfig = (field, value) => {
                setGithubConfig(prev => {
                    const next = { ...prev, [field]: value };
                    localStorage.setItem('jps_github_config', JSON.stringify(next));
                    return next;
                });
            };

            const [rawActuals, setRawActuals] = useState([]);
            const [rawBudget, setRawBudget] = useState([]);
            const [originalBudget, setOriginalBudget] = useState([]);
            const [isBudgetCommitted, setIsBudgetCommitted] = useState(false);
            
            const [budgetUrl, setBudgetUrl] = useState('');
            const [actualsUrl, setActualsUrl] = useState('');
            const [isLoadingUrl, setIsLoadingUrl] = useState({ budget: false, actuals: false });
            const [loadError, setLoadError] = useState('');
            
            const [isPushing, setIsPushing] = useState(false);
            const [isSyncingConfigs, setIsSyncingConfigs] = useState(false);
            const [hasAutoRestored, setHasAutoRestored] = useState(false);

            // Filters & State
            const [ytdMonth, setYtdMonth] = useState('All');
            const [fMonth, setFMonth] = useState('All');
            const [fYear, setFYear] = useState('All');
            const [fRC, setFRC] = useState('All');
            const [fParish, setFParish] = useState('All');
            const [fInd, setFInd] = useState('All');

            const [monthMapping, setMonthMapping] = useState({});
            const [allocOverrides, setAllocOverrides] = useState({});
            const [rcGrowthOverrides, setRcGrowthOverrides] = useState({});
            const [allocationResults, setAllocationResults] = useState([]);
            
            const [varianceDim, setVarianceDim] = useState('rc');
            const [drillDownDim, setDrillDownDim] = useState('name');
            const [expandedRow, setExpandedRow] = useState(null);
            const [isNormalizeHurricane, setIsNormalizeHurricane] = useState(true);

            // Version Manager
            const [savedVersions, setSavedVersions] = useState([]);
            const [isVersionModalOpen, setIsVersionModalOpen] = useState(false);

            const [graphToggles, setGraphToggles] = useState({
                act25: true, bud26: true, act26: true, marchLE: true, leCust: true, leRc: true, leMgmt: true, leCustom: true
            });

            const toggleConfig = [
                { key: 'act25', label: '2025 Actuals', activeClass: 'bg-slate-100 text-slate-700 border-slate-400', inactiveClass: 'bg-white text-slate-400 border-slate-200' },
                { key: 'bud26', label: '2026 Budget', activeClass: 'bg-blue-50 text-blue-700 border-blue-400', inactiveClass: 'bg-white text-slate-400 border-slate-200' },
                { key: 'act26', label: '2026 Actuals', activeClass: 'bg-purple-50 text-purple-700 border-purple-400', inactiveClass: 'bg-white text-slate-400 border-slate-200' },
                { key: 'marchLE', label: 'March LE', activeClass: 'bg-emerald-50 text-emerald-700 border-emerald-400', inactiveClass: 'bg-white text-slate-400 border-slate-200' },
                { key: 'leCust', label: 'LE Cust Vol', activeClass: 'bg-fuchsia-50 text-fuchsia-700 border-fuchsia-400', inactiveClass: 'bg-white text-slate-400 border-slate-200' },
                { key: 'leRc', label: 'LE RC Vol', activeClass: 'bg-sky-50 text-sky-700 border-sky-400', inactiveClass: 'bg-white text-slate-400 border-slate-200' },
                { key: 'leMgmt', label: 'LE Management', activeClass: 'bg-amber-50 text-amber-700 border-amber-400', inactiveClass: 'bg-white text-slate-400 border-slate-200' },
                { key: 'leCustom', label: 'LE Custom %', activeClass: 'bg-indigo-50 text-indigo-700 border-indigo-400', inactiveClass: 'bg-white text-slate-400 border-slate-200' }
            ];

            // 1. SILENT BOOT SEQUENCE - AUTO FETCH EVERYTHING
            useEffect(() => {
                let isMounted = true;

                const bootApp = async () => {
                    // Step A: Load CSV Data
                    try {
                        const actRes = await fetch('./JPS%20Actuals%20data.csv');
                        if (actRes.ok) {
                            const actText = await actRes.text();
                            const parsedAct = parseCSV(actText);
                            if(parsedAct && parsedAct.length > 0 && isMounted) setRawActuals(parsedAct);
                        }
                        
                        const budRes = await fetch('./JPS%20Budget%202026%20data.csv');
                        if (budRes.ok) {
                            const budText = await budRes.text();
                            const parsedBud = parseCSV(budText);
                            if(parsedBud && parsedBud.length > 0 && isMounted) {
                                setRawBudget(parsedBud);
                                setOriginalBudget([...parsedBud]);
                            }
                        }
                    } catch (e) {
                        console.log("Could not auto-load files from root.", e);
                        if (window.location.protocol === 'file:' && isMounted) {
                            setLoadError("Local file fetch blocked by browser security. Please run a local server or use the manual file inputs in the Data Hub.");
                        }
                    }

                    // Step B: Silently load Scenarios Config from GitHub (if credentials exist)
                    if (githubConfig.token && githubConfig.owner && githubConfig.repo && !githubConfig.token.includes('YOUR_TOKEN')) {
                        try {
                            const path = `dashboard_scenarios.json`;
                            const url = `https://api.github.com/repos/${githubConfig.owner.trim()}/${githubConfig.repo.trim()}/contents/${path}`;
                            const getRes = await fetch(url, { headers: { 'Authorization': `Bearer ${githubConfig.token.trim()}` } });
                            if (getRes.ok && isMounted) {
                                const fileData = await getRes.json();
                                const decodedContent = decodeURIComponent(escape(atob(fileData.content)));
                                const parsedScenarios = JSON.parse(decodedContent);
                                setSavedVersions(parsedScenarios);
                            }
                        } catch (e) {
                            console.log("No cloud scenarios found or failed to fetch config on boot.", e);
                        }
                    }
                };

                bootApp();
                return () => { isMounted = false; };
            }, []);

            // 2. AUTO-APPLY DEFAULT SCENARIO (Once everything is loaded into memory)
            useEffect(() => {
                if (!hasAutoRestored && originalBudget.length > 0 && rawActuals.length > 0 && savedVersions.length > 0) {
                    const defaultScenario = savedVersions.find(v => v.isDefault);
                    if (defaultScenario) {
                        console.log("Auto-restoring default scenario:", defaultScenario.name);
                        
                        setRawBudget([...originalBudget]);
                        setIsBudgetCommitted(false); // force re-allocation run
                        setMonthMapping(defaultScenario.monthMapping || {});
                        setAllocOverrides(defaultScenario.allocOverrides || {});
                        setRcGrowthOverrides(defaultScenario.rcGrowthOverrides || {});
                        setIsNormalizeHurricane(defaultScenario.isNormalizeHurricane ?? true);
                        
                        setHasAutoRestored(true);
                    } else {
                        setHasAutoRestored(true); // Don't check anymore if there is no default
                    }
                }
            }, [originalBudget, rawActuals, savedVersions, hasAutoRestored]);

            // --- Engine ---
            const { actuals, budget, marchLE, leCustGrowth, leRCGrowth, leMgmtGrowth, leCustomGrowth, dimensions } = useMemo(() => {
                if (rawActuals.length === 0 || rawBudget.length === 0) return { actuals: [], budget: [], marchLE: [], leCustGrowth: [], leRCGrowth: [], leMgmtGrowth: [], leCustomGrowth: [], dimensions: { rcs: [], parishes: [], inds: [], years: [] } };

                const normA = rawActuals.map(d => ({ source: d['Source'] || 'Postpaid', rc: d['Rate category'] || 'Unassigned', parish: d['Updated Parish'] || 'Unassigned', acct: d['JPS A/c'] || 'Unassigned', name: d['Name'] || 'Unassigned', industry: d['Industry'] || 'Unassigned', kwh: cleanVal(d['Sum of net_kwh_billed_consump']), ...parseTimeStr(d['Month']) }));
                const normB = rawBudget.map(d => ({ source: d['Source'] || 'Budget', rc: d['Rate category'] || 'Unassigned', parish: d['Updated Parish'] || 'Unassigned', acct: d['JPS A/c'] || 'Unallocated', name: d['Name'] || 'Unallocated', industry: d['Industry'] || 'Unallocated', kwh: cleanVal(d['Sum of Budget']), ...parseTimeStr(d['Month']) }));

                const march26Actuals = normA.filter(d => d.month === 3 && d.year === 2026);
                const baseline25 = normA.filter(d => d.year === 2025);
                const getNormalizedKwh = (d) => { if (isNormalizeHurricane && (d.month >= 10 && d.month <= 12)) return d.kwh / 0.65; return d.kwh; };

                const march25Map = {}; 
                baseline25.filter(d => d.month === 3).forEach(d => { march25Map[`${d.acct}|${d.rc}`] = (march25Map[`${d.acct}|${d.rc}`] || 0) + d.kwh; });

                const forecastData = [];
                normA.filter(d => d.year === 2026 && d.month <= 3).forEach(d => { forecastData.push({ ...d, source: 'March LE', type: 'Actual' }); });

                [4,5,6,7,8,9,10,11,12].forEach(mNum => {
                    const targetMonth25 = baseline25.filter(d => d.month === mNum);
                    march26Actuals.forEach(curr => {
                        const m25Val = march25Map[`${curr.acct}|${curr.rc}`] || 0;
                        const hist = targetMonth25.find(h => h.acct === curr.acct && h.rc === curr.rc);
                        let seasonality = 1.0;
                        if (m25Val > 0 && hist) { seasonality = getNormalizedKwh(hist) / m25Val; }
                        forecastData.push({ ...curr, source: 'March LE', type: 'Forecast', month: mNum, year: 2026, text: `${monthNames[mNum-1]} 2026`, sortKey: 202600 + mNum, qtr: Math.ceil(mNum/3), qtrText: `Q${Math.ceil(mNum/3)} 2026`, kwh: curr.kwh * seasonality });
                    });
                });

                const ytd25Cust = {}; const ytd26Cust = {};
                const ytd25RC = {};   const ytd26RC = {};
                normA.filter(d => d.month <= 3).forEach(d => {
                    if (d.year === 2025) { ytd25Cust[d.acct] = (ytd25Cust[d.acct] || 0) + d.kwh; ytd25RC[d.rc] = (ytd25RC[d.rc] || 0) + d.kwh; } 
                    else if (d.year === 2026) { ytd26Cust[d.acct] = (ytd26Cust[d.acct] || 0) + d.kwh; ytd26RC[d.rc] = (ytd26RC[d.rc] || 0) + d.kwh; }
                });

                const q1Actuals26 = normA.filter(d => d.year === 2026 && d.month <= 3).map(d => ({...d, source: 'LE Forecast', type: 'Actual'}));
                const leCustData = [...q1Actuals26]; const leRCData = [...q1Actuals26]; const leMgmtData = [...q1Actuals26]; const leCustomData = [...q1Actuals26];

                const bRcTotal = {}; const bCustTotal = {};
                normB.filter(d => d.year === 2026 && d.month >= 4).forEach(b => {
                    bRcTotal[`${b.month}|${b.rc}`] = (bRcTotal[`${b.month}|${b.rc}`] || 0) + b.kwh;
                    bCustTotal[`${b.month}|${b.acct}`] = (bCustTotal[`${b.month}|${b.acct}`] || 0) + b.kwh;
                });

                normB.filter(d => d.year === 2026 && d.month >= 4).forEach(b => {
                    const custMonthlyDelta = ((ytd26Cust[b.acct] || 0) - (ytd25Cust[b.acct] || 0)) / 3;
                    const rcMonthlyDelta = ((ytd26RC[b.rc] || 0) - (ytd25RC[b.rc] || 0)) / 3;
                    const rcWeight = b.kwh / (bRcTotal[`${b.month}|${b.rc}`] || 1);
                    const custWeight = b.kwh / (bCustTotal[`${b.month}|${b.acct}`] || 1);

                    const custKwh = Math.max(0, b.kwh + (custMonthlyDelta * custWeight));
                    const rcKwh = Math.max(0, b.kwh + (rcMonthlyDelta * rcWeight));

                    leCustData.push({ ...b, source: 'LE - Cust Vol Growth', type: 'Forecast', kwh: custKwh });
                    leRCData.push({ ...b, source: 'LE - RC Vol Growth', type: 'Forecast', kwh: rcKwh });
                    
                    const isCustRc = ['RT10', 'RT20', 'RT60'].includes(b.rc.toUpperCase());
                    leMgmtData.push({ ...b, source: 'LE - Management', type: 'Forecast', kwh: isCustRc ? custKwh : rcKwh });

                    const customPct = rcGrowthOverrides[b.rc] || 0;
                    const customKwh = Math.max(0, b.kwh * (1 + customPct / 100));
                    leCustomData.push({ ...b, source: 'LE - Custom RC %', type: 'Forecast', kwh: customKwh });
                });

                const rcs = [...new Set([...normA, ...normB].map(d => d.rc))].sort((a,b) => getRcWeight(a) - getRcWeight(b));
                const parishes = [...new Set([...normA, ...normB].map(d => d.parish))].sort();
                const inds = [...new Set(normA.map(d => d.industry))].sort();
                const years = [...new Set([...normA, ...normB].map(d => d.year))].filter(y=>y>0).sort();

                return { actuals: normA, budget: normB, marchLE: forecastData, leCustGrowth: leCustData, leRCGrowth: leRCData, leMgmtGrowth: leMgmtData, leCustomGrowth: leCustomData, dimensions: { rcs, parishes, inds, years } };
            }, [rawActuals, rawBudget, isNormalizeHurricane, rcGrowthOverrides]);

            // Mapping for Allocation Setup
            useEffect(() => {
                if (rawBudget.length === 0 || isBudgetCommitted) return;
                const bMonths = [...new Set(rawBudget.map(d => d.Month))].filter(Boolean);
                const aMonths = [...new Set(rawActuals.map(d => d.Month))].filter(Boolean);
                const aQuarters = [...new Set(rawActuals.map(d => {
                    const p = parseTimeStr(d.Month);
                    return p.year > 0 ? `Q${p.qtr} ${p.year} Average` : null;
                }))].filter(Boolean);

                const getRef = (target) => aQuarters.includes(target) ? target : (aMonths.includes(target) ? target : (aQuarters.length > 0 ? aQuarters[aQuarters.length-1] : ''));
                
                if (Object.keys(monthMapping).length === 0) {
                    const newMapping = {};
                    bMonths.forEach(bm => {
                        const p = parseTimeStr(bm);
                        if (p.year === 2026 && p.qtr <= 2) {
                            newMapping[bm] = getRef('Q1 2026 Average');
                        } else {
                            newMapping[bm] = getRef('Q4 2025 Average');
                        }
                    });
                    setMonthMapping(newMapping);
                }
            }, [rawBudget, rawActuals, isBudgetCommitted, monthMapping]);

            // Run Proration Engine
            useEffect(() => {
                if (isBudgetCommitted || rawActuals.length === 0 || rawBudget.length === 0) return;
                const allResults = [];
                const bMonths = [...new Set(rawBudget.map(d=>d.Month))].filter(Boolean);
                
                bMonths.forEach(tMonth => {
                    const rMonth = monthMapping[tMonth];
                    if (!rMonth) return;

                    const tBud = rawBudget.filter(d => d.Month === tMonth);
                    const bGroups = {};
                    tBud.forEach(b => {
                        const key = `${b['Rate category'] || 'Unassigned'}|${b['Updated Parish'] || 'Unassigned'}`;
                        if (!bGroups[key]) bGroups[key] = { amount: 0 };
                        bGroups[key].amount += cleanVal(b['Sum of Budget']);
                    });
                    
                    const isQuarter = rMonth.includes('Average');
                    const filteredActs = isQuarter 
                        ? rawActuals.filter(a => {
                            const p = parseTimeStr(a.Month);
                            return `Q${p.qtr} ${p.year} Average` === rMonth;
                          })
                        : rawActuals.filter(a => a.Month === rMonth);

                    const aGroups = {};
                    filteredActs.forEach(a => {
                        const groupKey = `${a['Rate category'] || 'Unassigned'}|${a['Updated Parish'] || 'Unassigned'}`;
                        const custKey = a['JPS A/c'];
                        
                        if (!aGroups[groupKey]) aGroups[groupKey] = { totalWeight: 0, customers: {} };
                        if (!aGroups[groupKey].customers[custKey]) {
                            aGroups[groupKey].customers[custKey] = { acct: custKey, name: a['Name'], industry: a['Industry'], weightObj: 0 };
                        }
                        
                        const val = Math.max(0, cleanVal(a['Sum of net_kwh_billed_consump']));
                        aGroups[groupKey].customers[custKey].weightObj += val;
                        aGroups[groupKey].totalWeight += val;
                    });

                    Object.keys(bGroups).forEach(key => {
                        const [rc, parish] = key.split('|'); 
                        const totB = bGroups[key].amount; 
                        const groupData = aGroups[key];
                        
                        if (!groupData || groupData.totalWeight === 0) { 
                            allResults.push({ targetMonth: tMonth, refMonth: rMonth, rc, parish, acct: 'UNALLOCATED', name: 'NO HISTORY', industry: 'Unallocated', finalA: totB, weight: 1, override: '-' }); 
                            return; 
                        }
                        
                        Object.values(groupData.customers).forEach(c => {
                            const w = c.weightObj / groupData.totalWeight; 
                            let finalVal = totB * w; 
                            let overrideStr = '-';
                            if (allocOverrides[c.industry]) { 
                                finalVal *= (1 + (allocOverrides[c.industry] / 100)); 
                                overrideStr = `${allocOverrides[c.industry]}%`; 
                            }
                            allResults.push({ targetMonth: tMonth, refMonth: rMonth, rc, parish, acct: c.acct, name: c.name, industry: c.industry, finalA: finalVal, weight: w, override: overrideStr });
                        });
                    });
                });
                setAllocationResults(allResults);
            }, [monthMapping, allocOverrides, rawBudget, rawActuals, isBudgetCommitted]);

            const commitAllocation = useCallback(() => {
                if (allocationResults.length === 0) return;
                
                if (originalBudget.length === 0) {
                    setOriginalBudget([...rawBudget]);
                }

                setRawBudget(allocationResults.map(r => ({ 'Source': 'Model Allocation', 'Rate category': r.rc, 'Updated Parish': r.parish, 'Month': r.targetMonth, 'Sum of Budget': (r.finalA || 0).toFixed(6), 'JPS A/c': r.acct, 'Name': r.name, 'Industry': r.industry })));
                setIsBudgetCommitted(true); 
            }, [allocationResults, rawBudget, originalBudget]);

            useEffect(() => {
                if (allocationResults.length > 0 && !isBudgetCommitted && rawActuals.length > 0 && rawBudget.length > 0) {
                    commitAllocation();
                }
            }, [allocationResults, isBudgetCommitted, rawActuals.length, rawBudget.length, commitAllocation]);

            const unlockAllocation = () => {
                if(originalBudget.length > 0) {
                    setRawBudget([...originalBudget]);
                }
                setIsBudgetCommitted(false);
            };

            // --- Cloud Functions ---
            const saveForecastToGitHub = async (csvDataArray, filename) => {
                const token = githubConfig.token.trim();
                const owner = githubConfig.owner.trim();
                const repo = githubConfig.repo.trim();

                if (!token || !owner || !repo || token.includes('YOUR_TOKEN')) {
                    alert("Please hardcode or enter your correct GitHub API credentials in the Data Hub first.");
                    setActiveTab('data');
                    return;
                }
                
                setIsPushing(true);
                try {
                    const headers = Object.keys(csvDataArray[0]).filter(k => typeof csvDataArray[0][k] !== 'object');
                    const csvString = [
                        headers.join(','),
                        ...csvDataArray.map(row => headers.map(h => `"${(row[h] !== undefined && row[h] !== null) ? row[h].toString().replace(/"/g, '""') : ''}"`).join(','))
                    ].join('\n');

                    const base64Content = btoa(unescape(encodeURIComponent(csvString)));
                    const path = `${filename}.csv`;
                    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

                    let fileSha = null;
                    const getRes = await fetch(url, { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' } });
                    
                    if (getRes.ok) {
                        const fileData = await getRes.json();
                        fileSha = fileData.sha;
                    }

                    const body = { message: `Auto-update ${filename}.csv from Sales Dashboard`, content: base64Content };
                    if (fileSha) body.sha = fileSha;

                    const putRes = await fetch(url, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });

                    if (putRes.ok) {
                        alert(`Successfully pushed ${filename}.csv to GitHub repository!`);
                    } else {
                        const err = await putRes.json();
                        if (putRes.status === 404) alert(`Failed to save: "Not Found" (404).\n\nCauses:\n1. Your Personal Access Token does NOT have the 'repo' scope checked.\n2. Typo in Repository Owner or Name.`);
                        else alert(`Failed to save to GitHub: ${err.message}`);
                    }
                } catch (error) {
                    alert("An unexpected error occurred while communicating with GitHub.");
                } finally {
                    setIsPushing(false);
                }
            };

            const pushScenariosToCloud = async (versionsOverride = null) => {
                const versionsToPush = versionsOverride || savedVersions;
                
                const token = githubConfig.token.trim();
                const owner = githubConfig.owner.trim();

                    }));

                    const jsonString = JSON.stringify(payloadToSave, null, 2);
                    const base64Content = btoa(unescape(encodeURIComponent(jsonString)));
                    const path = `dashboard_scenarios.json`;
                    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

                    let fileSha = null;
                    const getRes = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                    if (getRes.ok) {
                        const fileData = await getRes.json();
                        fileSha = fileData.sha;
                    }

                    const body = { message: `Sync dashboard scenarios to cloud`, content: base64Content };
                    if (fileSha) body.sha = fileSha;

                    const putRes = await fetch(url, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });

                    if (!putRes.ok) {
                        const err = await putRes.json();
                        alert(`Failed to sync config to GitHub: ${err.message}`);
                    }
                } catch (error) {
                    alert("An unexpected error occurred while communicating with GitHub.");
                } finally {
                    setIsSyncingConfigs(false);
                }
            };

            const pullScenariosFromCloud = async () => {
                const token = githubConfig.token.trim();
                const owner = githubConfig.owner.trim();
                const repo = githubConfig.repo.trim();

                if (!token || !owner || !repo || token.includes('YOUR_TOKEN')) {
                    alert("Please configure your GitHub credentials first.");
                    return;
                }

                setIsSyncingConfigs(true);
                try {
                    const path = `dashboard_scenarios.json`;
                    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

                    const getRes = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                    if (getRes.ok) {
                        const fileData = await getRes.json();
                        const decodedContent = decodeURIComponent(escape(atob(fileData.content)));
                        const parsedScenarios = JSON.parse(decodedContent);
                        
                        setSavedVersions(parsedScenarios);
                        alert("Cloud scenarios loaded into your Versions menu.");
                    } else if (getRes.status === 404) {
                        alert("No 'dashboard_scenarios.json' config file found on GitHub. Push a scenario to the cloud first!");
                    } else {
                        alert("Failed to fetch scenarios from GitHub.");
                    }
                } catch (error) {
                    alert("An unexpected error occurred while parsing cloud data.");
                } finally {
                    setIsSyncingConfigs(false);
                }
            };

            // --- Handlers ---
            const handleFileUpload = (e, isBudget) => {
                const reader = new FileReader();
                reader.onload = (evt) => { 
                    const data = parseCSV(evt.target.result); 
                    if(isBudget) { 
                        setRawBudget(data); 
                        setOriginalBudget([...data]); 
                        setIsBudgetCommitted(false); 
                    } else { 
                        setRawActuals(data); 
                    } 
                };
                reader.readAsText(e.target.files[0]);
            };

            const handleFetchUrl = async (url, isBudget) => {
                if(!url) return;
                setIsLoadingUrl(p => ({...p, [isBudget ? 'budget' : 'actuals']: true}));
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const text = await response.text();
                    const data = parseCSV(text);
                    if (isBudget) { 
                        setRawBudget(data); 
                        setOriginalBudget([...data]); 
                        setIsBudgetCommitted(false); 
                    } else { 
                        setRawActuals(data); 
                    }
                } catch (e) {
                    alert('Error fetching file: ' + e.message);
                } finally {
                    setIsLoadingUrl(p => ({...p, [isBudget ? 'budget' : 'actuals']: false}));
                }
            };

            const handleSaveVersion = () => {
                const name = prompt("Enter a name for this scenario version:");
                if (!name) return;
                
                const isDefault = savedVersions.length === 0;
                const newVersion = { id: Date.now(), name, timestamp: new Date().toLocaleString(), isDefault, monthMapping: { ...monthMapping }, allocOverrides: { ...allocOverrides }, rcGrowthOverrides: { ...rcGrowthOverrides }, isNormalizeHurricane };
                
                const updatedVersions = [...savedVersions, newVersion];
                setSavedVersions(updatedVersions);
                
                if (githubConfig.token && !githubConfig.token.includes('YOUR_TOKEN')) {
                    pushScenariosToCloud(updatedVersions);
                } else {
                    alert(`Version "${name}" saved locally!`);
                }
            };

            const handleRestoreVersion = (version) => {
                if (originalBudget.length > 0) {
                    setRawBudget([...originalBudget]);
                }
                setIsBudgetCommitted(false); 
                setMonthMapping(version.monthMapping || {}); 
                setAllocOverrides(version.allocOverrides || {}); 
                setRcGrowthOverrides(version.rcGrowthOverrides || {}); 
                setIsNormalizeHurricane(version.isNormalizeHurricane ?? true);

                    pushScenariosToCloud(updatedVersions);

                    ...v,
                    isDefault: v.id === id
                }));

                    await pushScenariosToCloud(updatedVersions);

            const handleClearData = () => {
                if(!confirm("Are you sure you want to clear all data and reset the engine? This will wipe the current session's actuals, budget, and all saved scenarios.")) return;
                setRawActuals([]);
                setRawBudget([]);
                setOriginalBudget([]);

                setActualsUrl('');

                setAllocOverrides({});
                setRcGrowthOverrides({});

            const getFiltered = useCallback((data) => {

                    if (fParish !== 'All' && d.parish !== fParish) return false;
                    if (fInd !== 'All' && d.industry !== fInd) return false;
                    return true;
                });
            }, [fYear, fMonth, fRC, fParish, fInd]);

            const monthlyAggregates = useMemo(() => {
                if (actuals.length === 0) return [];
                const fAct = getFiltered(actuals); const fBud = getFiltered(budget); const fMarchLE = getFiltered(marchLE); const fLeCust = getFiltered(leCustGrowth); const fLeRC = getFiltered(leRCGrowth); const fLeMgmt = getFiltered(leMgmtGrowth); const fLeCustom = getFiltered(leCustomGrowth);
                return monthNames.map((m, idx) => {

                    const b26 = fBud.filter(d => d.year === 2026 && d.month === mNum).reduce((s,d)=>s+d.kwh,0);
                    const a26 = fAct.filter(d => d.year === 2026 && d.month === mNum).reduce((s,d)=>s+d.kwh,0);
                    const le26 = fMarchLE.filter(d => d.year === 2026 && d.month === mNum).reduce((s,d)=>s+d.kwh,0);
                    const leCust26 = fLeCust.filter(d => d.year === 2026 && d.month === mNum).reduce((s,d)=>s+d.kwh,0);
                    const leRC26 = fLeRC.filter(d => d.year === 2026 && d.month === mNum).reduce((s,d)=>s+d.kwh,0);
                    const leMgmt26 = fLeMgmt.filter(d => d.year === 2026 && d.month === mNum).reduce((s,d)=>s+d.kwh,0);
                    const leCustom26 = fLeCustom.filter(d => d.year === 2026 && d.month === mNum).reduce((s,d)=>s+d.kwh,0);
                    return { month: m.substring(0,3), monthFull: m, Act25: a25, Bud26: b26, Act26: a26 > 0 ? a26 : null, MarchLE: le26, LeCust: leCust26, LeRC: leRC26, LeMgmt: leMgmt26, LeCustom: leCustom26 };
                });
            }, [actuals, budget, marchLE, leCustGrowth, leRCGrowth, leMgmtGrowth, leCustomGrowth, getFiltered]);

            // --- UI Components ---
            const renderGraphToggles = () => (
                <div className="flex flex-wrap items-center gap-3 mb-4 bg-slate-50 p-2 rounded-lg border border-slate-200">
                    <span className="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center gap-1 ml-2"><Icons.Eye className="w-3 h-3"/> Map Scenarios:</span>
                    {toggleConfig.map(t => (

                            <input type="checkbox" className="hidden" checked={graphToggles[t.key]} onChange={() => setGraphToggles(p => ({...p, [t.key]: !p[t.key]}))} />
                            <div className={`w-2 h-2 rounded-full ${graphToggles[t.key] ? 'bg-current shadow-sm' : 'bg-slate-300'}`}></div>

                    <div className="flex gap-2 ml-auto pr-2">

                        <button className="text-[10px] uppercase tracking-wider font-bold text-slate-500 hover:text-red-500 transition" onClick={() => setGraphToggles({act25:false, bud26:false, act26:false, marchLE:false, leCust:false, leRc:false, leMgmt:false, leCustom:false})}>All Off</button>

            );

            const customRcControls = (
                <div className="bg-indigo-50/50 p-5 rounded-xl border border-indigo-100 shadow-sm mb-6">

                        </select>

                        }} className="bg-indigo-600 text-white px-4 rounded font-bold hover:bg-indigo-700 shadow-sm transition">+</button>
                    </div>
                    <div className="flex flex-wrap gap-2 min-h-[36px]">

            const renderLeCustomTab = () => renderGenericForecastTab(leCustomGrowth, 'LE: Custom RC % Trend', 'Projection based on user-defined percentage adjustments applied to the remaining Budget by Rate Class.', <Icons.Sliders className="text-indigo-500"/>, 'indigo', 'text-indigo-700', true, 'leCustom', customRcControls);

            const renderGlossaryTab = () => (
                <div className="p-10 h-full overflow-y-auto custom-scroll">
                    <div className="max-w-5xl mx-auto bg-white p-8 rounded-xl border shadow-sm space-y-10">
                        <div>
                            <h2 className="text-2xl font-black text-slate-800 mb-6 flex items-center gap-2 border-b pb-4"><Icons.BookOpen className="text-blue-600"/> Forecasting Scenarios Glossary</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-emerald-50/50 border border-emerald-200 p-6 rounded-xl space-y-3">
                                    <h3 className="text-lg font-bold text-emerald-800 flex items-center gap-2"><Icons.Wind/> March LE (Run-Rate Method)</h3>
                                    <p className="text-sm text-slate-700"><strong>Definition:</strong> Projects April–December 2026 using the <em>actual</em> billed volumes from March 2026 as the jumping-off point. It shapes the remaining months by applying the 2025 seasonality curve to that March baseline.</p>
                                    <p className="text-sm text-slate-700"><strong>Rationale:</strong> Best for capturing immediate, recent shifts in run-rate. It ignores the original budget entirely, assuming that the most recent actual month is the truest indicator of current trajectory.</p>
                                </div>
                                <div className="bg-purple-50/50 border border-purple-200 p-6 rounded-xl space-y-3">
                                    <h3 className="text-lg font-bold text-purple-800 flex items-center gap-2"><Icons.Users/> LE: Customer Volumetric Trend</h3>
                                    <p className="text-sm text-slate-700"><strong>Definition:</strong> Calculates the absolute average monthly kWh variance for <em>each individual customer</em> (Q1 2026 vs Q1 2025). This absolute volumetric difference is then added to or subtracted from that customer's remaining budgeted months.</p>
                                    <p className="text-sm text-slate-700"><strong>Rationale:</strong> Safely adjusts the granular budget for customer-specific over/under-performance.</p>
                                </div>
                                <div className="bg-blue-50/50 border border-blue-200 p-6 rounded-xl space-y-3">
                                    <h3 className="text-lg font-bold text-blue-800 flex items-center gap-2"><Icons.Zap/> LE: Rate Class Volumetric Trend</h3>
                                    <p className="text-sm text-slate-700"><strong>Definition:</strong> Calculates the absolute average monthly kWh variance for the <em>entire Rate Class</em> (Q1 2026 vs Q1 2025). This aggregate class variance is then spread proportionally across all customers in that class based on their budget share.</p>
                                    <p className="text-sm text-slate-700"><strong>Rationale:</strong> Smooths out extreme individual customer anomalies. This is best for classes with many customers where individual account noise is high.</p>
                                </div>
                                <div className="bg-orange-50/50 border border-orange-200 p-6 rounded-xl space-y-3">
                                    <h3 className="text-lg font-bold text-orange-800 flex items-center gap-2"><Icons.Briefcase/> LE: Management Trend (Hybrid)</h3>
                                    <p className="text-sm text-slate-700"><strong>Definition:</strong> A blended approach. It uses the <em>Customer Volumetric Trend</em> for specific commercial/industrial classes (RT10, RT20, RT60) and uses the <em>Rate Class Volumetric Trend</em> for all other classes.</p>
                                    <p className="text-sm text-slate-700"><strong>Rationale:</strong> Provides a balanced, pragmatic outlook aligned with business operations. The commercial accounts are individually managed and driven by specific business decisions (thus mapped by customer trend), while residential/general classes are better forecasted via smoothed, class-wide macroeconomic trends.</p>
                                </div>
                                <div className="bg-indigo-50/50 border border-indigo-200 p-6 rounded-xl space-y-3 md:col-span-2">
                                    <h3 className="text-lg font-bold text-indigo-800 flex items-center gap-2"><Icons.Sliders/> LE: Custom RC % Trend</h3>
                                    <p className="text-sm text-slate-700"><strong>Definition:</strong> Allows the user to manually define percentage multipliers that are applied to the remaining Budget for specific Rate Classes.</p>
                                    <p className="text-sm text-slate-700"><strong>Rationale:</strong> Used to model specific external hypotheses (e.g. "What if temperature drives residential volume 5% higher than budgeted?").</p>
                                </div>
                            </div>
                        </div>
                        <div>
                            <h2 className="text-xl font-bold text-slate-800 mb-4 border-b pb-2">Core Engine Mechanics</h2>
                            <div className="space-y-4 text-sm text-slate-600">
                                <section><h3 className="font-bold text-slate-800">Budget Proration Engine</h3><p>High-level targets are redistributed to the account level using historical weights from the "Reference Actuals" month selected in the Allocation Engine.</p></section>
                                <section><h3 className="font-bold text-slate-800">Hurricane Normalization Toggle</h3><p>When enabled, it grosses up Oct–Dec 2025 historical volumes (e.g., dividing by 0.65 to reverse a 35% drop) to ensure the seasonal ratios used in the March LE projection represent true business-as-usual behavior.</p></section>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-full w-full bg-slate-100">
                    <header className="bg-white border-b px-6 py-4 flex justify-between items-center shrink-0 z-20">
                        <div>
                            <h1 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icons.PieChart/> JPS Sales Analytics Model</h1>
                            <p className="text-xs text-slate-500">Commercial Analytics | Redistribution & Forecasting Engine</p>
                        </div>
                        <div className="flex items-center gap-4">
                            {rawActuals.length > 0 && (
                                <div className={`text-xs px-3 py-1.5 rounded-full border shadow-sm flex items-center gap-2 ${isBudgetCommitted ? 'bg-emerald-50 text-emerald-700 border-emerald-200':'bg-orange-50 text-orange-700 border-orange-200'}`}>
                                    <span className={`w-2 h-2 rounded-full ${isBudgetCommitted ? 'bg-emerald-500' : 'bg-orange-400 animate-pulse'}`}></span>
                                    {isBudgetCommitted ? 'Granular Budget Active' : 'Allocating Budget...'}
                                </div>
                            )}
                            {(rawActuals.length > 0 || rawBudget.length > 0) && (
                                <div className="flex items-center gap-2 border-l pl-4 border-slate-200">
                                    {rawActuals.length > 0 && rawBudget.length > 0 && (
                                        <>
                                            <button onClick={handleSaveVersion} className="flex items-center gap-1.5 text-sm bg-white hover:bg-slate-50 text-slate-700 px-3 py-1.5 rounded-lg border shadow-sm transition font-medium"><Icons.Save /> Save Scenario</button>
                                            <button onClick={() => setIsVersionModalOpen(true)} className="flex items-center gap-1.5 text-sm bg-white hover:bg-slate-50 text-slate-700 px-3 py-1.5 rounded-lg border shadow-sm transition font-medium"><Icons.History /> Versions <span className="bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded text-xs ml-1">{savedVersions.length}</span></button>
                                        </>
                                    )}
                                    <button onClick={handleClearData} className="flex items-center gap-1.5 text-sm bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded-lg border border-red-200 shadow-sm transition font-medium" title="Clear all data and restart">
                                        <Icons.RefreshCw /> Reset
                                    </button>
                                </div>
                            )}
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Vertical Sidebar Tabs */}
                        <aside className="w-56 bg-white border-r flex flex-col gap-1 p-4 shrink-0 overflow-y-auto custom-scroll z-10 shadow-sm">
                            {rawActuals.length > 0 && (
                                <>
                                    <button onClick={()=>setActiveTab('overview')} className={`dashboard-tab ${activeTab==='overview'?'active':''}`}><Icons.Activity/> Overview</button>
                                    <button onClick={()=>setActiveTab('monthly')} className={`dashboard-tab ${activeTab==='monthly'?'active':''}`}><Icons.Calendar/> Monthly View</button>
                                    <button onClick={()=>setActiveTab('allocation')} className={`dashboard-tab ${activeTab==='allocation'?'active':''}`}><Icons.Calculator/> Allocation</button>
                                    
                                    <div className="h-px bg-slate-200 my-3 mx-2"></div>
                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider px-3 mb-1">Forecast Scenarios</div>
                                    
                                    <button onClick={()=>setActiveTab('forecast')} className={`dashboard-tab ${activeTab==='forecast'?'active':''}`}><Icons.Wind/> March LE</button>
                                    <button onClick={()=>setActiveTab('leCust')} className={`dashboard-tab ${activeTab==='leCust'?'active':''}`}><Icons.Users/> LE: Cust Vol</button>
                                    <button onClick={()=>setActiveTab('leRC')} className={`dashboard-tab ${activeTab==='leRC'?'active':''}`}><Icons.Zap/> LE: RC Vol</button>
                                    <button onClick={()=>setActiveTab('leMgmt')} className={`dashboard-tab ${activeTab==='leMgmt'?'active':''}`}><Icons.Briefcase/> LE: Mgmt</button>
                                    <button onClick={()=>setActiveTab('leCustom')} className={`dashboard-tab ${activeTab==='leCustom'?'active':''}`}><Icons.Sliders/> LE: Custom %</button>
                                    
                                    <div className="h-px bg-slate-200 my-3 mx-2"></div>
                                    <button onClick={()=>setActiveTab('variance')} className={`dashboard-tab ${activeTab==='variance'?'active':''}`}><Icons.TrendingUp/> Variance Matrix</button>
                                </>
                            )}
                            <button onClick={()=>setActiveTab('glossary')} className={`dashboard-tab ${activeTab==='glossary'?'active':''}`}><Icons.BookOpen/> Glossary</button>
                            
                            <div className="mt-auto"></div>
                            <div className="h-px bg-slate-200 my-3 mx-2"></div>
                            <button onClick={()=>setActiveTab('data')} className={`dashboard-tab ${activeTab==='data'?'active':''}`}><Icons.Database/> Data Hub</button>
                        </aside>

                        <main className="flex-1 flex flex-col min-w-0 overflow-hidden relative">
                             {rawActuals.length > 0 && ['overview', 'monthly', 'forecast', 'leCust', 'leRC', 'leMgmt', 'leCustom', 'variance'].includes(activeTab) && (
                                <div className="bg-white border-b px-6 py-3 flex gap-4 items-center text-[10px] font-bold uppercase tracking-wider text-slate-500 shadow-sm shrink-0 overflow-x-auto z-10 relative">
                                    <Icons.Filter className="w-3 h-3"/> 
                                    <div className="flex items-center gap-1 border-r pr-3">
                                        <Icons.Calendar />
                                        <select value={ytdMonth} onChange={e=>setYtdMonth(e.target.value)} className="bg-transparent text-blue-700 outline-none">
                                            <option value="All">Full Year (YTD)</option>
                                            {monthNames.map(m=><option key={m} value={m}>YTD: {m}</option>)}
                                        </select>
                                    </div>
                                    <select value={fRC} onChange={e=>setFRC(e.target.value)} className="bg-transparent outline-none"><option value="All">All Rates</option>{dimensions.rcs.map(r=><option key={r}>{r}</option>)}</select>
                                    <select value={fParish} onChange={e=>setFParish(e.target.value)} className="bg-transparent outline-none"><option value="All">All Parishes</option>{dimensions.parishes.map(p=><option key={p}>{p}</option>)}</select>
                                    <select value={fInd} onChange={e=>setFInd(e.target.value)} className="bg-transparent outline-none"><option value="All">All Industries</option>{dimensions.inds.map(i=><option key={i}>{i}</option>)}</select>
                                </div>
                             )}

                            <div className="flex-1 overflow-hidden relative bg-slate-50/50 z-0">
                                <ErrorBoundary>
                                    {rawActuals.length === 0 && activeTab !== 'data' && activeTab !== 'glossary' ? (
                                        <div className="flex flex-col items-center justify-center h-full text-slate-500">
                                            <Icons.CloudDown className="w-12 h-12 mb-4 animate-bounce text-blue-400"/>
                                            <h2 className="text-xl font-bold mb-2">Fetching Cloud Data...</h2>
                                            <p className="text-sm mb-6 max-w-md text-center">Auto-loading actuals and budget from your repository. If this takes more than a few seconds, you may need to configure your data sources manually.</p>
                                            <button onClick={() => setActiveTab('data')} className="bg-slate-800 text-white px-6 py-2 rounded-lg font-bold shadow hover:bg-slate-900 transition">Go to Data Hub</button>
                                        </div>
                                    ) : (
                                        <>
                                            {activeTab === 'data' && renderDataTab()}
                                            {activeTab === 'overview' && renderOverviewTab()}
                                            {activeTab === 'monthly' && renderMonthlyTab()}
                                            {activeTab === 'allocation' && renderAllocationTab()}
                                            {activeTab === 'forecast' && renderForecastTab()}
                                            {activeTab === 'leCust' && renderLeCustTab()}
                                            {activeTab === 'leRC' && renderLeRCTab()}
                                            {activeTab === 'leMgmt' && renderLeMgmtTab()}
                                            {activeTab === 'leCustom' && renderLeCustomTab()}
                                            {activeTab === 'variance' && renderVarianceTab()}
                                            {activeTab === 'glossary' && renderGlossaryTab()}
                                        </>
                                    )}
                                </ErrorBoundary>
                            </div>
                        </main>
                    </div>

                    {isVersionModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-3xl flex flex-col overflow-hidden max-h-[80vh]">
                                <div className="px-6 py-4 border-b flex justify-between items-center bg-slate-50">
                                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icons.History/> Saved Scenarios & Versions</h2>
                                    <button onClick={() => setIsVersionModalOpen(false)} className="text-slate-400 hover:text-slate-600 transition"><Icons.X/></button>
                                </div>
                                
                                <div className="bg-slate-800 p-4 flex justify-between items-center text-white shrink-0 shadow-inner">
                                    <div className="flex items-center gap-2 text-sm">
                                        <Icons.CloudUp className="text-blue-400"/> 
                                        <span className="font-bold">Cloud Sync</span>
                                        <span className="text-slate-400 text-xs ml-2">Pulling manually overwrites unsaved local versions.</span>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={pullScenariosFromCloud} disabled={isSyncingConfigs} className="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded text-sm font-bold shadow-sm transition disabled:opacity-50 flex items-center gap-2"><Icons.CloudDown/> {isSyncingConfigs ? '...' : 'Pull Config from Cloud'}</button>
                                    </div>
                                </div>

                                <div className="p-6 overflow-y-auto flex-1 bg-slate-50/50">
                                    {savedVersions.length === 0 ? (
                                        <div className="text-center py-10 text-slate-500">
                                            <Icons.Save className="w-12 h-12 mx-auto mb-3 text-slate-300"/>
                                            <p className="font-medium">No versions saved locally.</p>
                                            <p className="text-sm mt-1 mb-4">Save a version from the header, or pull from the cloud.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            {savedVersions.map(v => (
                                                <div key={v.id} className={`bg-white border rounded-xl p-4 flex items-center justify-between shadow-sm transition ${v.isDefault ? 'border-amber-400 bg-amber-50/20' : 'hover:border-blue-300'}`}>
                                                    <div>
                                                        <h4 className="font-bold text-slate-800 text-lg flex items-center gap-2">
                                                            {v.isDefault && <span className="text-amber-500 flex items-center gap-1 text-xs px-2 py-0.5 bg-amber-100 rounded-full border border-amber-200"><Icons.Star filled /> Default</span>}
                                                            {v.name}
                                                        </h4>
                                                        <p className="text-xs text-slate-500 mt-1 flex items-center gap-2">
                                                            <span><Icons.Calendar className="inline w-3 h-3 mr-1"/> {v.timestamp}</span>
                                                            <span className="text-slate-300">|</span>
                                                            <span>Overrides: {Object.keys(v.allocOverrides || {}).length + Object.keys(v.rcGrowthOverrides || {}).length}</span>
                                                            <span className="text-slate-300">|</span>
                                                            <span className={v.isNormalizeHurricane ? 'text-emerald-600' : 'text-slate-400'}>Hurricane Norm: {v.isNormalizeHurricane ? 'ON' : 'OFF'}</span>
                                                        </p>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        {!v.isDefault && (
                                                            <button onClick={() => handleSetDefaultVersion(v.id)} className="bg-white border hover:bg-amber-50 hover:text-amber-600 text-slate-500 px-3 py-2 rounded-lg text-sm font-bold shadow-sm transition flex items-center gap-1" title="Load this scenario automatically for everyone">
                                                                <Icons.Star /> Make Default
                                                            </button>
                                                        )}
                                                        <button onClick={() => handleRestoreVersion(v)} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition">
                                                            Restore
                                                        </button>
                                                        <button onClick={() => handleDeleteVersion(v.id)} className="bg-white border hover:bg-red-50 text-red-500 p-2 rounded-lg shadow-sm transition" title="Delete">
                                                            <Icons.Trash/>
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
