    <style>
        .custom-scroll::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .table-pin-col { position: sticky; left: 0; background: white; z-index: 10; border-right: 2px solid #e2e8f0; }
        .table-pin-header { position: sticky; top: 0; background: #f8fafc; z-index: 20; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        
        .dashboard-tab {
            padding: 10px 16px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #64748b;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            width: 100%;
            font-weight: 500;
        }
        .dashboard-tab:hover { background: #f1f5f9; color: #0f172a; }
        .dashboard-tab.active { background: #e0f2fe; color: #0ea5e9; font-weight: 700; }
        th.sortable:hover { background-color: #e2e8f0; cursor: pointer; transition: background-color 0.2s; }
    </style>
